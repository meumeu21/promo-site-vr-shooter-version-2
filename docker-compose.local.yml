services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_IP:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - local-dev-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${DB_HOST_IP:-127.0.0.1}:${DB_HOST_PORT:-5432}:5432"
    volumes:
      - local-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - local-dev-network

networks:
  local-dev-network:
    driver: bridge

volumes:
  local-postgres-data:
