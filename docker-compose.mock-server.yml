services:
  mock-server:
    build:
      context: .
      dockerfile: apps/mock-server/Dockerfile
    env_file:
      - ./.env
      - ./apps/mock-server/.env
    environment:
      CONTROL_TOKEN: ${MOCK_CONTROL_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lbe-network

networks:
  lbe-network:
    external: true
    name: promo-site-vr-shooter-version-2_lbe-network
