<svg width="640" height="180" viewBox="0 0 640 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shooter MVP Logo</title>
  <desc id="desc">Neon styled logo for Shooter MVP landing page.</desc>
  <defs>
    <linearGradient id="neon" x1="40" y1="20" x2="600" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="638" height="178" rx="20" stroke="url(#neon)" stroke-opacity="0.55"/>
  <text x="36" y="92" fill="url(#neon)" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="4" filter="url(#glow)">
    SHOOTER
  </text>
  <text x="402" y="92" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="4">
    MVP
  </text>
  <text x="40" y="138" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="22" letter-spacing="6">
    VR • LBE • CYBERPUNK
  </text>
</svg>
